<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarbershopSystem — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-escuro: #0a1a2f;
            --azul-medio: #1a2a4f;
            --azul-accent: #2563eb;
            --azul-light: #dbeafe;
            --cinza-escuro: #1e293b;
            --cinza-medio: #64748b;
            --cinza-claro: #e2e8f0;
            --branco: #ffffff;
            --fundo: #f1f5f9;
            --sidebar-w: 264px;
            --verde: #10b981;
            --amarelo: #f59e0b;
            --vermelho: #ef4444;
            --roxo: #8b5cf6;
            --topbar-h: 68px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--fundo);
            color: var(--cinza-escuro);
            display: flex;
            min-height: 100vh;
        }

        /* =========== SIDEBAR =========== */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--azul-escuro);
            min-height: 100vh;
            position: fixed;
            left: 0; top: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-logo {
            padding: 24px 20px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            gap: 11px;
        }

        .logo-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--azul-accent), #7c3aed);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .logo-name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            color: var(--branco);
            line-height: 1.1;
        }
        .logo-name span {
            display: block;
            font-size: 0.62rem;
            font-weight: 400;
            color: rgba(255,255,255,0.38);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .sidebar-user {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex; align-items: center; gap: 11px;
        }
        .user-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.8rem; color: white;
            flex-shrink: 0;
        }
        .user-meta strong { display: block; color: white; font-size: 0.82rem; }
        .user-meta small { color: rgba(255,255,255,0.38); font-size: 0.7rem; }

        .sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
        .nav-section-label {
            font-size: 0.6rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.12em;
            color: rgba(255,255,255,0.25);
            padding: 10px 12px 6px; margin-top: 4px;
        }
        .nav-item {
            display: flex; align-items: center; gap: 11px;
            padding: 9px 12px; border-radius: 9px;
            color: rgba(255,255,255,0.5);
            font-size: 0.86rem; font-weight: 500;
            cursor: pointer; transition: all 0.16s;
            width: 100%; background: none; border: none;
            font-family: 'DM Sans', sans-serif; text-align: left;
        }
        .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.82); }
        .nav-item.active { background: var(--azul-accent); color: white; box-shadow: 0 4px 14px rgba(37,99,235,0.35); }
        .nav-icon { font-size: 1rem; width: 20px; text-align: center; }

        .sidebar-footer { padding: 12px 10px; border-top: 1px solid rgba(255,255,255,0.07); }
        .btn-logout {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; border-radius: 9px;
            color: rgba(255,255,255,0.4);
            cursor: pointer; width: 100%; background: none; border: none;
            font-family: 'DM Sans', sans-serif; font-size: 0.86rem; font-weight: 500;
            transition: all 0.16s;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.12); color: #fca5a5; }

        /* =========== MAIN =========== */
        .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

        .topbar {
            background: white; padding: 0 32px; height: var(--topbar-h);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--cinza-claro);
            position: sticky; top: 0; z-index: 50;
        }
        .topbar-left h1 { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--azul-escuro); }
        .topbar-left p { font-size: 0.77rem; color: var(--cinza-medio); margin-top: 1px; }
        .topbar-right { display: flex; gap: 12px; align-items: center; }
        .topbar-date {
            font-size: 0.78rem; color: var(--cinza-medio);
            background: var(--fundo); padding: 6px 13px;
            border-radius: 20px; border: 1px solid var(--cinza-claro);
        }
        .btn-novo {
            background: var(--azul-accent); color: white; border: none;
            padding: 9px 18px; border-radius: 9px;
            font-size: 0.84rem; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 7px;
            transition: background 0.15s, transform 0.1s;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-novo:hover { background: #1d4ed8; }
        .btn-novo:active { transform: scale(0.97); }

        .content { padding: 28px 32px; flex: 1; }

        /* =========== KPI CARDS =========== */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .kpi-card {
            background: white; border-radius: 14px; padding: 20px 22px;
            border: 1px solid var(--cinza-claro); position: relative; overflow: hidden;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .kpi-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.07); transform: translateY(-2px); }
        .kpi-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 14px 14px 0 0;
        }
        .kpi-card.azul::before { background: var(--azul-accent); }
        .kpi-card.verde::before { background: var(--verde); }
        .kpi-card.amarelo::before { background: var(--amarelo); }
        .kpi-card.roxo::before { background: var(--roxo); }
        .kpi-card-icon {
            width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; margin-bottom: 12px;
        }
        .kpi-card.azul .kpi-card-icon { background: #eff6ff; }
        .kpi-card.verde .kpi-card-icon { background: #f0fdf4; }
        .kpi-card.amarelo .kpi-card-icon { background: #fffbeb; }
        .kpi-card.roxo .kpi-card-icon { background: #f5f3ff; }
        .kpi-value { font-family: 'Syne', sans-serif; font-size: 1.85rem; font-weight: 800; color: var(--azul-escuro); line-height: 1; }
        .kpi-label { font-size: 0.78rem; color: var(--cinza-medio); margin-top: 5px; font-weight: 500; }
        .kpi-sub { font-size: 0.72rem; color: var(--verde); margin-top: 3px; font-weight: 600; }

        /* =========== CARDS =========== */
        .card { background: white; border-radius: 14px; border: 1px solid var(--cinza-claro); overflow: hidden; margin-bottom: 18px; }
        .card-header {
            padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--cinza-claro);
        }
        .card-title { font-family: 'Syne', sans-serif; font-size: 0.92rem; font-weight: 700; color: var(--azul-escuro); }
        .card-body { padding: 18px 20px; }

        /* =========== TABLE =========== */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 11px 12px; text-align: left; border-bottom: 1px solid var(--cinza-claro); font-size: 0.84rem; }
        .data-table th { background: var(--fundo); font-weight: 600; color: var(--azul-escuro); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tbody tr:hover { background: #fafbfc; }
        .data-table td { color: var(--cinza-escuro); }

        /* =========== BADGES =========== */
        .status-badge {
            font-size: 0.68rem; font-weight: 600; padding: 3px 10px;
            border-radius: 20px; display: inline-block; letter-spacing: 0.02em;
        }
        .status-ativo { background: #ecfdf5; color: #059669; }
        .status-inativo { background: #fef2f2; color: #dc2626; }
        .status-agendado { background: #eff6ff; color: #2563eb; }
        .status-confirmado { background: #ecfdf5; color: #059669; }
        .status-concluido { background: #f5f3ff; color: #7c3aed; }
        .status-cancelado { background: #fef2f2; color: #dc2626; }
        .status-pendente { background: #fffbeb; color: #d97706; }

        /* =========== FILTER BAR =========== */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
        .filter-bar input, .filter-bar select {
            padding: 8px 12px; border: 1px solid var(--cinza-claro);
            border-radius: 8px; font-size: 0.84rem; font-family: 'DM Sans', sans-serif;
            background: white; color: var(--cinza-escuro); outline: none;
            transition: border-color 0.15s;
        }
        .filter-bar input:focus, .filter-bar select:focus { border-color: var(--azul-accent); }

        /* =========== ACTION BUTTONS =========== */
        .btn-editar, .btn-deletar, .btn-save, .btn-cancel {
            padding: 5px 12px; margin: 0 2px;
            font-size: 0.75rem; border-radius: 6px; border: none;
            cursor: pointer; font-weight: 600; font-family: 'DM Sans', sans-serif;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn-editar:active, .btn-deletar:active { transform: scale(0.96); }
        .btn-editar { background: #eff6ff; color: #2563eb; }
        .btn-editar:hover { background: #dbeafe; }
        .btn-deletar { background: #fef2f2; color: #dc2626; }
        .btn-deletar:hover { background: #fee2e2; }
        .btn-save { background: var(--azul-accent); color: white; padding: 10px 22px; font-size: 0.88rem; border-radius: 9px; width: 100%; margin-top: 6px; }
        .btn-save:hover { background: #1d4ed8; }
        .btn-cancel { background: var(--fundo); color: var(--cinza-medio); padding: 10px 22px; font-size: 0.88rem; border-radius: 9px; width: 100%; margin-top: 6px; border: 1px solid var(--cinza-claro); }
        .btn-cancel:hover { background: var(--cinza-claro); }

        /* =========== MODAL =========== */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,20,40,0.55); backdrop-filter: blur(3px);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 28px; border-radius: 18px;
            max-width: 500px; width: 92%; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
            animation: modalIn 0.2s ease;
        }
        @keyframes modalIn { from { transform: scale(0.95) translateY(8px); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
        .modal-header h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--azul-escuro); }
        .modal-close { background: none; border: none; cursor: pointer; color: var(--cinza-medio); font-size: 1.3rem; padding: 2px 6px; border-radius: 6px; }
        .modal-close:hover { background: var(--fundo); color: var(--cinza-escuro); }
        .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }

        /* =========== FORM =========== */
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.82rem; color: var(--cinza-escuro); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 9px 12px; border: 1px solid var(--cinza-claro);
            border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
            color: var(--cinza-escuro); outline: none; transition: border-color 0.15s, box-shadow 0.15s;
            background: white;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--azul-accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }

        /* =========== TOAST =========== */
        #toastContainer {
            position: fixed; bottom: 28px; right: 28px;
            display: flex; flex-direction: column; gap: 10px; z-index: 9999; pointer-events: none;
        }
        .toast {
            display: flex; align-items: center; gap: 10px;
            padding: 13px 18px; border-radius: 12px;
            font-size: 0.86rem; font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            pointer-events: all; max-width: 340px;
            animation: toastIn 0.25s ease;
        }
        @keyframes toastIn { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes toastOut { to { transform: translateY(8px); opacity: 0; } }
        .toast.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .toast.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .toast.info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .toast-icon { font-size: 1rem; flex-shrink: 0; }

        /* =========== LOADING SKELETON =========== */
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton-row td { padding: 14px 12px !important; }

        /* =========== DASHBOARD EXTRAS =========== */
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .user-row { padding: 11px 0; border-bottom: 1px solid var(--cinza-claro); display: flex; align-items: center; gap: 12px; }
        .user-row:last-child { border-bottom: none; }
        .user-row-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #2563eb, #7c3aed); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; color: white; flex-shrink: 0; }
        .user-row-info { flex: 1; min-width: 0; }
        .user-row-info strong { display: block; font-size: 0.84rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-row-info small { color: var(--cinza-medio); font-size: 0.72rem; }

        .servico-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--cinza-claro); }
        .servico-row:last-child { border-bottom: none; }
        .servico-row-nome { font-size: 0.84rem; font-weight: 500; }
        .servico-row-preco { font-size: 0.84rem; font-weight: 700; color: var(--azul-accent); }

        /* =========== EMPTY STATE =========== */
        .empty-state { text-align: center; padding: 48px 20px; color: var(--cinza-medio); }
        .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
        .empty-state p { font-size: 0.88rem; }

        /* =========== CONFIG SECTION =========== */
        .config-section { margin-bottom: 24px; }
        .config-section h4 { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; margin-bottom: 14px; color: var(--azul-escuro); }
        .info-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--cinza-claro); font-size: 0.86rem; }
        .info-row:last-child { border-bottom: none; }
        .info-row span:first-child { color: var(--cinza-medio); }
        .info-row span:last-child { font-weight: 600; }

        /* =========== RESPONSIVE =========== */
        @media (max-width: 1100px) {
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .dash-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 900px) {
            .sidebar { width: 68px; }
            .logo-name, .user-meta, .nav-item > span:last-child, .nav-section-label, .btn-logout > span:last-child { display: none !important; }
            .main { margin-left: 68px; }
            .nav-item { justify-content: center; padding: 10px; }
            .content { padding: 20px 18px; }
            .topbar { padding: 0 18px; }
        }
        @media (max-width: 600px) {
            .kpi-grid { grid-template-columns: 1fr 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">✂️</div>
        <div class="logo-name">Barbershop<span>System v2</span></div>
    </div>
    <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar">--</div>
        <div class="user-meta">
            <strong id="sidebarNome">Carregando...</strong>
            <small>Administrador</small>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-label">Principal</div>
        <button class="nav-item active" data-page="dashboard" onclick="showPage('dashboard', this)">
            <span class="nav-icon">🏠</span> <span>Dashboard</span>
        </button>
        <button class="nav-item" data-page="usuarios" onclick="showPage('usuarios', this)">
            <span class="nav-icon">👤</span> <span>Usuários</span>
        </button>
        <button class="nav-item" data-page="servicos" onclick="showPage('servicos', this)">
            <span class="nav-icon">✂️</span> <span>Serviços</span>
        </button>
        <button class="nav-item" data-page="funcionarios" onclick="showPage('funcionarios', this)">
            <span class="nav-icon">💈</span> <span>Funcionários</span>
        </button>
        <button class="nav-item" data-page="agendamentos" onclick="showPage('agendamentos', this)">
            <span class="nav-icon">📅</span> <span>Agendamentos</span>
        </button>
        <div class="nav-section-label">Sistema</div>
        <button class="nav-item" data-page="configuracoes" onclick="showPage('configuracoes', this)">
            <span class="nav-icon">⚙️</span> <span>Configurações</span>
        </button>
    </nav>
    <div class="sidebar-footer">
        <button class="btn-logout" onclick="fazerLogout()">
            <span>🚪</span> <span>Sair do sistema</span>
        </button>
    </div>
</aside>

<main class="main">
    <div class="topbar">
        <div class="topbar-left">
            <h1 id="pageTitle">Dashboard</h1>
            <p id="pageSubtitle">Visão geral do negócio</p>
        </div>
        <div class="topbar-right">
            <div class="topbar-date" id="dataHoje"></div>
            <button class="btn-novo" id="actionButton" onclick="acaoPrincipal()" style="display:none">➕ Novo</button>
        </div>
    </div>
    <div class="content" id="mainContent">
        <div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--cinza-medio)">
            Carregando...
        </div>
    </div>
</main>

<div class="modal" id="modal" onclick="fecharModalFora(event)">
    <div class="modal-content" id="modalContent"></div>
</div>

<div id="toastContainer"></div>

<script>
const API_URL = 'http://localhost:3000';
let currentPage = 'dashboard';

const usuarioLogado = JSON.parse(localStorage.getItem('usuario') || '{"nome":"Admin","email":"admin@barbearia.com","cep":""}');

// ===================== TOAST =====================
function toast(msg, tipo = 'success') {
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    const el = document.createElement('div');
    el.className = `toast ${tipo}`;
    el.innerHTML = `<span class="toast-icon">${icons[tipo]}</span><span>${msg}</span>`;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => {
        el.style.animation = 'toastOut 0.3s ease forwards';
        setTimeout(() => el.remove(), 300);
    }, 3200);
}

// ===================== API =====================
async function apiGet(endpoint) {
    try {
        const r = await fetch(`${API_URL}${endpoint}`);
        if (!r.ok) throw new Error('Erro');
        return await r.json();
    } catch { return []; }
}
async function apiPost(endpoint, data) {
    try {
        const r = await fetch(`${API_URL}${endpoint}`, {
            method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
        });
        return await r.json();
    } catch { return { error: 'Erro de conexão' }; }
}
async function apiPut(endpoint, data) {
    try {
        const r = await fetch(`${API_URL}${endpoint}`, {
            method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
        });
        return await r.json();
    } catch { return { error: 'Erro de conexão' }; }
}
async function apiDelete(endpoint, data = null) {
    try {
        const opts = { method: 'DELETE' };
        if (data) { opts.headers = {'Content-Type':'application/json'}; opts.body = JSON.stringify(data); }
        const r = await fetch(`${API_URL}${endpoint}`, opts);
        return await r.json();
    } catch { return { error: 'Erro de conexão' }; }
}

// ===================== INIT =====================
function inicializar() {
    document.getElementById('sidebarNome').textContent = usuarioLogado.nome || 'Usuário';
    const iniciais = (usuarioLogado.nome || 'U').split(' ').slice(0,2).map(n => n[0]).join('').toUpperCase();
    document.getElementById('sidebarAvatar').textContent = iniciais;
    const agora = new Date();

const pageMeta = {
    dashboard:     { title: 'Dashboard',     subtitle: 'Visão geral do negócio',  btn: null },
    usuarios:      { title: 'Usuários',       subtitle: 'Gerenciar usuários',       btn: '➕ Novo Usuário' },
    servicos:      { title: 'Serviços',       subtitle: 'Gerenciar serviços',       btn: '➕ Novo Serviço' },
    funcionarios:  { title: 'Funcionários',   subtitle: 'Gerenciar funcionários',   btn: '➕ Novo Funcionário' },
    agendamentos:  { title: 'Agendamentos',   subtitle: 'Gerenciar agendamentos',   btn: '➕ Novo Agendamento' },
    configuracoes: { title: 'Configurações',  subtitle: 'Configurações do sistema', btn: null },
};

function showPage(page, btn) {
    currentPage = page;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    if (btn) btn.closest('.nav-item').classList.add('active');

    const meta = pageMeta[page] || {};
    document.getElementById('pageTitle').textContent = meta.title || page;
    document.getElementById('pageSubtitle').textContent = meta.subtitle || '';

    const actionBtn = document.getElementById('actionButton');
    if (meta.btn) { actionBtn.style.display = 'flex'; actionBtn.innerHTML = meta.btn; }
    else actionBtn.style.display = 'none';

    renderPage();
}

async function renderPage() {
    const c = document.getElementById('mainContent');
    const map = { dashboard: renderDashboard, usuarios: renderUsuarios, servicos: renderServicos, funcionarios: renderFuncionarios, agendamentos: renderAgendamentos, configuracoes: renderConfiguracoes };
    c.innerHTML = map[currentPage] ? await map[currentPage]() : '<p>Página não encontrada</p>';
}

function acaoPrincipal() {
    const map = { usuarios: () => abrirModalUsuario(), servicos: () => abrirModalServico(), funcionarios: () => abrirModalFuncionario(), agendamentos: () => abrirModalAgendamento() };
    if (map[currentPage]) map[currentPage]();
}

    return `

                <div class="kpi-sub">Média dos serviços</div>
            </div>
            <div class="kpi-card roxo">
                <div class="kpi-card-icon">⭐</div>
                <div class="kpi-value">${totalPontos}</div>
                <div class="kpi-label">Total de Pontos</div>
                <div class="kpi-sub">Programa fidelidade</div>
            </div>

        <div class="dash-grid">
            <div class="card">
                <div class="card-header"><div class="card-title">👤 Últimos Usuários</div></div>
                <div class="card-body">
                    ${recentUsers.length ? recentUsers.map(u => {
                        const ini = u.nome_completo.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();

            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">✂️ Serviços por Preço</div></div>
                <div class="card-body">
                    ${topServicos.length ? topServicos.map(s => `
                        <div class="servico-row">
                            <div>
                                <div class="servico-row-nome">${s.nome}</div>
                                <small style="color:var(--cinza-medio)">${s.duracao}min · ${s.pontos}pts</small>

async function salvarUsuario(id) {
    const dados = {
        nome_completo: document.getElementById('uNome').value.trim(),
        email: document.getElementById('uEmail').value.trim(),
        cep: document.getElementById('uCep').value.trim(),

    };

        ${data ? `<div class="form-group"><label>Status</label><select id="sStatus"><option value="1" ${data.status==1?'selected':''}>Ativo</option><option value="0" ${data.status==0?'selected':''}>Inativo</option></select></div>` : ''}
        <div class="modal-btns">
            <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
            <button class="btn-save" style="margin:0" onclick="salvarServico(${data?.id_servicos || 'null'})">Salvar</button>
        </div>
    `;

async function salvarServico(id) {
    const dados = {
        nome: document.getElementById('sNome').value.trim(),
        preco: parseFloat(document.getElementById('sPreco').value),
        duracao: parseInt(document.getElementById('sDuracao').value),
        pontos: parseInt(document.getElementById('sPontos').value) || 0
    };
    if (!dados.nome || isNaN(dados.preco) || isNaN(dados.duracao)) { toast('Preencha todos os campos obrigatórios', 'error'); return; }
    let result;
    if (id) {
        dados.status = parseInt(document.getElementById('sStatus')?.value ?? 1);
        result = await apiPut(`/servicos/${id}`, dados);
    } else {
        dados.status = 1; // Novo serviço sempre começa ativo
        result = await apiPost('/servicos', dados);
    }
    if (result.error) { toast(result.error, 'error'); return; }
    toast(result.mensagem || 'Serviço salvo!');
    fecharModal(); renderPage();
}

    const result = await apiDelete(`/servicos/${id}`);
    toast(result.mensagem || result.error, result.error ? 'error' : 'success');
    renderPage();
}

function filtrarAgendamentos() {
    const data = document.getElementById('filtroData')?.value || '';
    const status = document.getElementById('filtroStatus')?.value || '';
    document.querySelectorAll('#tabelaAg tbody tr').forEach(row => {
        let show = true;
        if (status && row.dataset.status !== status) show = false;
        if (data) {
            const cellData = row.cells[1]?.querySelector('strong')?.textContent || '';
            const [day, month, year] = cellData.split('/');
            const rowDate = year && month && day ? `${year}-${month}-${day}` : '';
            if (rowDate !== data) show = false;
        }
        row.style.display = show ? '' : 'none';
    });
}

async function abrirModalAgendamento(data = null) {
    const [usuarios, servicos, funcs] = await Promise.all([apiGet('/buscar'), apiGet('/servicos'), apiGet('/funcionarios')]);

    let dataVal = '', horaVal = '';
    if (data?.data) {
        const d = new Date(data.data);
        dataVal = d.toISOString().split('T')[0];
        horaVal = d.toTimeString().slice(0,5);
    }

    // Armazena lista de usuários globalmente para o autocomplete
    window._agUsuarios = usuarios;

    const clienteNomeInicial = data ? (usuarios.find(u => u.id_usuario == data.id_usuario)?.nome_completo || '') : '';

    document.getElementById('modal').style.display = 'flex';
    document.getElementById('modalContent').innerHTML = `
        ${modalHeader(data ? 'Editar Agendamento' : 'Novo Agendamento')}
        <div class="form-group" style="position:relative">
            <label>Cliente *</label>
            <input type="text" id="agClienteSearch" placeholder="Digite para buscar cliente..."
                autocomplete="off"
                value="${clienteNomeInicial}"
                oninput="filtrarClientesDropdown()"
                onfocus="document.getElementById('agClienteDropdown').style.display='block'; filtrarClientesDropdown()"
                onblur="setTimeout(()=>{ document.getElementById('agClienteDropdown').style.display='none' }, 200)"
                style="cursor:text">
            <input type="hidden" id="agCliente" value="${data?.id_usuario || ''}">
            <div id="agClienteDropdown"
                style="display:none;position:absolute;top:calc(100% + 2px);left:0;right:0;background:white;
                border:1px solid #e2e8f0;border-radius:9px;max-height:180px;overflow-y:auto;
                z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.12)">
                ${usuarios.map(u => `
                <div class="ag-cliente-opt" data-id="${u.id_usuario}" data-nome="${u.nome_completo.replace(/"/g,'&quot;')}"
                    onmousedown="selecionarClienteAg(${u.id_usuario}, this.dataset.nome)"
                    style="padding:9px 13px;cursor:pointer;font-size:0.86rem;border-bottom:1px solid #f1f5f9;transition:background 0.1s"
                    onmouseover="this.style.background='#eff6ff'"
                    onmouseout="this.style.background=''">
                    ${u.nome_completo}
                </div>`).join('')}
            </div>
        </div>
        <div class="form-group"><label>Serviço *</label>
            <select id="agServico">
                <option value="">Selecione o serviço</option>
                ${servicos.map(s => `<option value="${s.id_servicos}" ${data?.id_servicos==s.id_servicos?'selected':''}>${s.nome} — R$ ${parseFloat(s.preco).toFixed(2)}</option>`).join('')}
            </select>
        </div>
        <div class="form-group"><label>Profissional *</label>
            <select id="agFuncionario">
                <option value="">Selecione o profissional</option>
                ${funcs.map(f => `<option value="${f.id_funcionario}" ${data?.id_funcionario==f.id_funcionario?'selected':''}>${f.nome} — ${f.funcao}</option>`).join('')}
            </select>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Data *</label><input type="date" id="agData" value="${dataVal}"></div>
            <div class="form-group"><label>Horário *</label><input type="time" id="agHora" value="${horaVal}"></div>
        </div>
        <div class="form-group"><label>Status</label>
            <select id="agStatus">
                ${['agendado','confirmado','concluido','cancelado'].map(s => `<option value="${s}" ${data?.status===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
            </select>
        </div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
            <button class="btn-save" style="margin:0" onclick="salvarAgendamento(${data?.id || 'null'})">Salvar</button>
        </div>
    `;
}

function filtrarClientesDropdown() {
    const termo = document.getElementById('agClienteSearch').value.toLowerCase();
    const dropdown = document.getElementById('agClienteDropdown');
    if (!dropdown) return;
    dropdown.style.display = 'block';
    const opts = dropdown.querySelectorAll('.ag-cliente-opt');
    opts.forEach(opt => {
        const nome = opt.dataset.nome.toLowerCase();
        opt.style.display = nome.includes(termo) ? '' : 'none';
    });
    // Se o campo foi limpo, limpa o hidden também
    if (!document.getElementById('agClienteSearch').value.trim()) {
        document.getElementById('agCliente').value = '';
    }
}

function selecionarClienteAg(id, nome) {
    document.getElementById('agCliente').value = id;
    document.getElementById('agClienteSearch').value = nome;
    document.getElementById('agClienteDropdown').style.display = 'none';
}

async function salvarAgendamento(id) {
    const dataInput = document.getElementById('agData').value;
    const horaInput = document.getElementById('agHora').value;
    const servicoSelect = document.getElementById('agServico');
    const servicoOpt = servicoSelect.options[servicoSelect.selectedIndex];
    // Extrai o preço do texto da option (ex: "Corte — R$ 35.00")
    const precoMatch = servicoOpt?.text.match(/R\$\s*([\d,.]+)/);
    const agenda_valor = precoMatch ? parseFloat(precoMatch[1].replace(',', '.')) : 0;

    const dados = {
        id_usuario: parseInt(document.getElementById('agCliente').value),
        id_servicos: parseInt(document.getElementById('agServico').value),
        id_funcionario: parseInt(document.getElementById('agFuncionario').value),
        agenda_valor,
        data: dataInput && horaInput ? `${dataInput}T${horaInput}:00` : null,
        status: document.getElementById('agStatus').value
    };
    if (!dados.id_usuario || !dados.id_servicos || !dados.id_funcionario || !dados.data) {
        toast('Preencha todos os campos obrigatórios', 'error'); return;
    }
    const result = id
        ? await apiPut(`/agendamentos/${id}`, dados)
        : await apiPost('/agendamentos', dados);
    if (result.error) { toast(result.error, 'error'); return; }
    toast(result.mensagem || 'Agendamento salvo!');
    fecharModal(); renderPage();
}

async function editarAgendamento(id) {
    const ags = await apiGet('/agendamentos');
    abrirModalAgendamento(ags.find(a => a.id === id));
}

async function deletarAgendamento(id) {
    if (!confirm('Excluir este agendamento?')) return;
    const result = await apiDelete(`/agendamentos/${id}`);
    toast(result.mensagem || result.error, result.error ? 'error' : 'success');
    renderPage();
}

    return `
        <div class="dash-grid">
            <div class="card">
                <div class="card-header"><div class="card-title">👤 Meu Perfil</div></div>
                <div class="card-body">
                    <div class="config-section">
                        <div class="info-row"><span>Nome</span><span>${usuarioLogado.nome || '—'}</span></div>
                        <div class="info-row"><span>Email</span><span>${usuarioLogado.email || '—'}</span></div>
                        <div class="info-row"><span>CEP</span><span>${usuarioLogado.cep || 'Não informado'}</span></div>
                    </div>
                    <button class="btn-novo" style="width:auto;margin-top:6px" onclick="abrirModalEditarPerfil()">✏️ Editar Perfil</button>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">🔒 Segurança</div></div>
                <div class="card-body">
                    <p style="font-size:0.85rem;color:var(--cinza-medio);margin-bottom:14px">Altere sua senha de acesso ao sistema.</p>
                    <div class="form-group"><label>Nova Senha</label><input type="password" id="novaSenha" placeholder="Mínimo 6 caracteres"></div>
                    <div class="form-group"><label>Confirmar Senha</label><input type="password" id="confirmarSenha" placeholder="Repita a senha"></div>
                    <button class="btn-novo" style="width:auto" onclick="alterarSenha()">🔑 Alterar Senha</button>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header"><div class="card-title">ℹ️ Sobre o Sistema</div></div>
            <div class="card-body">
                <div class="info-row"><span>Sistema</span><span>BarbershopSystem</span></div>
                <div class="info-row"><span>Versão</span><span>2.0.0</span></div>
                <div class="info-row"><span>Backend</span><span>Node.js + Express + MySQL</span></div>
                <div class="info-row"><span>API Base</span><span>${API_URL}</span></div>
            </div>
        </div>
    `;
}

function abrirModalEditarPerfil() {
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('modalContent').innerHTML = `
        ${modalHeader('Editar Perfil')}
        <div class="form-group"><label>Nome Completo *</label><input type="text" id="pNome" value="${usuarioLogado.nome || ''}"></div>
        <div class="form-group"><label>Email *</label><input type="email" id="pEmail" value="${usuarioLogado.email || ''}"></div>
        <div class="form-group"><label>CEP</label><input type="text" id="pCep" value="${usuarioLogado.cep || ''}"></div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
            <button class="btn-save" style="margin:0" onclick="salvarPerfil()">Salvar</button>
        </div>
    `;
}

async function salvarPerfil() {
    const dados = {
        id_usuario: usuarioLogado.id_usuario,
        nome_completo: document.getElementById('pNome').value.trim(),
        email: document.getElementById('pEmail').value.trim(),
        cep: document.getElementById('pCep').value.trim()
    };
    if (!dados.nome_completo || !dados.email) { toast('Preencha os campos obrigatórios', 'error'); return; }
    const result = await apiPut('/atualizar', dados);
    if (result.error) { toast(result.error, 'error'); return; }
    usuarioLogado.nome = dados.nome_completo;
    usuarioLogado.email = dados.email;
    usuarioLogado.cep = dados.cep;
    localStorage.setItem('usuario', JSON.stringify(usuarioLogado));
    document.getElementById('sidebarNome').textContent = dados.nome_completo;
    document.getElementById('sidebarAvatar').textContent = dados.nome_completo.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
    toast('Perfil atualizado!');
    fecharModal(); renderPage();
}

async function alterarSenha() {
    const nova = document.getElementById('novaSenha')?.value;
    const conf = document.getElementById('confirmarSenha')?.value;
    if (!nova || nova.length < 6) { toast('Senha deve ter mínimo 6 caracteres', 'error'); return; }
    if (nova !== conf) { toast('As senhas não conferem', 'error'); return; }
    const result = await apiPut('/atualizar', { id_usuario: usuarioLogado.id_usuario, nome_completo: usuarioLogado.nome, email: usuarioLogado.email, cep: usuarioLogado.cep || '', senha: nova });
    if (result.error) { toast(result.error, 'error'); return; }
    toast('Senha alterada com sucesso!');
    document.getElementById('novaSenha').value = '';
    document.getElementById('confirmarSenha').value = '';
}

// ===================== LOGOUT =====================
function fazerLogout() {
    if (!confirm('Deseja sair do sistema?')) return;
    localStorage.removeItem('token');
    localStorage.removeItem('usuario');
    window.location.href = 'index.html';
}

inicializar();
