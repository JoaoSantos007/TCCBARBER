<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarbershopSystem — Dashboard</title>
    <link href="styleDash.css" rel="stylesheet">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">✂️</div>
        <div class="logo-name">Barbershop<span>System v2</span></div>
    </div>
    <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar">--</div>
        <div class="user-meta">
            <strong id="sidebarNome">Carregando...</strong>
            <small>Administrador</small>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-label">Principal</div>
        <button class="nav-item active" data-page="dashboard" onclick="showPage('dashboard', this)">
            <span class="nav-icon">🏠</span> <span>Dashboard</span>
        </button>
        <button class="nav-item" data-page="usuarios" onclick="showPage('usuarios', this)">
            <span class="nav-icon">👤</span> <span>Usuários</span>
        </button>
        <button class="nav-item" data-page="servicos" onclick="showPage('servicos', this)">
            <span class="nav-icon">✂️</span> <span>Serviços</span>
        </button>
        <button class="nav-item" data-page="funcionarios" onclick="showPage('funcionarios', this)">
            <span class="nav-icon">💈</span> <span>Funcionários</span>
        </button>
        <button class="nav-item" data-page="agendamentos" onclick="showPage('agendamentos', this)">
            <span class="nav-icon">📅</span> <span>Agendamentos</span>
        </button>
        <div class="nav-section-label">Sistema</div>
        <button class="nav-item" data-page="configuracoes" onclick="showPage('configuracoes', this)">
            <span class="nav-icon">⚙️</span> <span>Configurações</span>
        </button>
    </nav>
    <div class="sidebar-footer">
        <button class="btn-logout" onclick="fazerLogout()">
            <span>🚪</span> <span>Sair do sistema</span>
        </button>
    </div>
</aside>

<main class="main">
    <div class="topbar">
        <div class="topbar-left">
            <h1 id="pageTitle">Dashboard</h1>
            <p id="pageSubtitle">Visão geral do negócio</p>
        </div>
        <div class="topbar-right">
            <div class="topbar-date" id="dataHoje"></div>
            <button class="btn-novo" id="actionButton" onclick="acaoPrincipal()" style="display:none">➕ Novo</button>
        </div>
    </div>
    <div class="content" id="mainContent">
        <div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--cinza-medio)">
            Carregando...
        </div>
    </div>
</main>

<div class="modal" id="modal" onclick="fecharModalFora(event)">
    <div class="modal-content" id="modalContent"></div>
</div>

<div id="toastContainer"></div>

<script>
const API_URL = 'http://localhost:3000';
let currentPage = 'dashboard';

const usuarioLogado = JSON.parse(localStorage.getItem('usuario') || '{"nome":"Admin","email":"admin@barbearia.com","cep":""}');

// ===================== TOAST =====================
function toast(msg, tipo = 'success') {
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    const el = document.createElement('div');
    el.className = `toast ${tipo}`;
    el.innerHTML = `<span class="toast-icon">${icons[tipo]}</span><span>${msg}</span>`;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => {
        el.style.animation = 'toastOut 0.3s ease forwards';
        setTimeout(() => el.remove(), 300);
    }, 3200);
}

// ===================== API =====================
async function apiGet(endpoint) {
    try {
        const r = await fetch(`${API_URL}${endpoint}`);
        if (!r.ok) throw new Error('Erro');
        return await r.json();
    } catch { return []; }
}
async function apiPost(endpoint, data) {
    try {
        const r = await fetch(`${API_URL}${endpoint}`, {
            method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
        });
        return await r.json();
    } catch { return { error: 'Erro de conexão' }; }
}
async function apiPut(endpoint, data) {
    try {
        const r = await fetch(`${API_URL}${endpoint}`, {
            method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
        });
        return await r.json();
    } catch { return { error: 'Erro de conexão' }; }
}
async function apiDelete(endpoint, data = null) {
    try {
        const opts = { method: 'DELETE' };
        if (data) { opts.headers = {'Content-Type':'application/json'}; opts.body = JSON.stringify(data); }
        const r = await fetch(`${API_URL}${endpoint}`, opts);
        return await r.json();
    } catch { return { error: 'Erro de conexão' }; }
}

// ===================== INIT =====================
function inicializar() {
    document.getElementById('sidebarNome').textContent = usuarioLogado.nome || 'Usuário';
    const iniciais = (usuarioLogado.nome || 'U').split(' ').slice(0,2).map(n => n[0]).join('').toUpperCase();
    document.getElementById('sidebarAvatar').textContent = iniciais;
    const agora = new Date();
    document.getElementById('dataHoje').textContent = '📅 ' + agora.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' });
    showPage('dashboard', document.querySelector('.nav-item[data-page="dashboard"]'));
}

// ===================== NAVIGATION =====================
const pageMeta = {
    dashboard:     { title: 'Dashboard',     subtitle: 'Visão geral do negócio',  btn: null },
    usuarios:      { title: 'Usuários',       subtitle: 'Gerenciar usuários',       btn: '➕ Novo Usuário' },
    servicos:      { title: 'Serviços',       subtitle: 'Gerenciar serviços',       btn: '➕ Novo Serviço' },
    funcionarios:  { title: 'Funcionários',   subtitle: 'Gerenciar funcionários',   btn: '➕ Novo Funcionário' },
    agendamentos:  { title: 'Agendamentos',   subtitle: 'Gerenciar agendamentos',   btn: '➕ Novo Agendamento' },
    configuracoes: { title: 'Configurações',  subtitle: 'Configurações do sistema', btn: null },
};

function showPage(page, btn) {
    currentPage = page;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    if (btn) btn.closest('.nav-item').classList.add('active');

    const meta = pageMeta[page] || {};
    document.getElementById('pageTitle').textContent = meta.title || page;
    document.getElementById('pageSubtitle').textContent = meta.subtitle || '';

    const actionBtn = document.getElementById('actionButton');
    if (meta.btn) { actionBtn.style.display = 'flex'; actionBtn.innerHTML = meta.btn; }
    else actionBtn.style.display = 'none';

    renderPage();
}

async function renderPage() {
    const c = document.getElementById('mainContent');
    const map = { dashboard: renderDashboard, usuarios: renderUsuarios, servicos: renderServicos, funcionarios: renderFuncionarios, agendamentos: renderAgendamentos, configuracoes: renderConfiguracoes };
    c.innerHTML = map[currentPage] ? await map[currentPage]() : '<p>Página não encontrada</p>';
}

function acaoPrincipal() {
    const map = { usuarios: () => abrirModalUsuario(), servicos: () => abrirModalServico(), funcionarios: () => abrirModalFuncionario(), agendamentos: () => abrirModalAgendamento() };
    if (map[currentPage]) map[currentPage]();
}

// ===================== MODAL =====================
function fecharModal() { document.getElementById('modal').style.display = 'none'; }
function fecharModalFora(e) { if (e.target === document.getElementById('modal')) fecharModal(); }

function modalHeader(titulo) {
    return `<div class="modal-header"><h3>${titulo}</h3><button class="modal-close" onclick="fecharModal()">✕</button></div>`;
}

// ===================== DASHBOARD =====================
async function renderDashboard() {
    const [usuarios, servicos] = await Promise.all([apiGet('/buscar'), apiGet('/servicos')]);
    const servicosAtivos = servicos.filter(s => s.status == 1);
    const ticketMedio = servicosAtivos.length ? (servicosAtivos.reduce((a, s) => a + parseFloat(s.preco), 0) / servicosAtivos.length) : 0;
    const totalPontos = servicos.reduce((a, s) => a + parseInt(s.pontos || 0), 0);

    const recentUsers = usuarios.slice(0, 5);
    const topServicos = [...servicos].sort((a, b) => parseFloat(b.preco) - parseFloat(a.preco)).slice(0, 5);

    return `
        <div class="kpi-grid">
            <div class="kpi-card azul">
                <div class="kpi-card-icon">👤</div>
                <div class="kpi-value">${usuarios.length}</div>
                <div class="kpi-label">Total de Usuários</div>
                <div class="kpi-sub">Sistema ativo</div>
            </div>
            <div class="kpi-card verde">
                <div class="kpi-card-icon">✂️</div>
                <div class="kpi-value">${servicosAtivos.length}</div>
                <div class="kpi-label">Serviços Ativos</div>
                <div class="kpi-sub">${servicos.length - servicosAtivos.length} inativos</div>
            </div>
            <div class="kpi-card amarelo">
                <div class="kpi-card-icon">💰</div>
                <div class="kpi-value">R$&nbsp;${ticketMedio.toFixed(0)}</div>
                <div class="kpi-label">Ticket Médio</div>
                <div class="kpi-sub">Média dos serviços</div>
            </div>
            <div class="kpi-card roxo">
                <div class="kpi-card-icon">⭐</div>
                <div class="kpi-value">${totalPontos}</div>
                <div class="kpi-label">Total de Pontos</div>
                <div class="kpi-sub">Programa fidelidade</div>
            </div>
        </div>
        <div class="dash-grid">
            <div class="card">
                <div class="card-header"><div class="card-title">👤 Últimos Usuários</div></div>
                <div class="card-body">
                    ${recentUsers.length ? recentUsers.map(u => {
                        const ini = u.nome_completo.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
                        return `<div class="user-row">
                            <div class="user-row-avatar">${ini}</div>
                            <div class="user-row-info">
                                <strong>${u.nome_completo}</strong>
                                <small>${u.email}</small>
                            </div>
                            ${u.primeiro_acesso ? '<span class="status-badge status-pendente">1º Acesso</span>' : '<span class="status-badge status-ativo">Ativo</span>'}
                        </div>`;
                    }).join('') : '<div class="empty-state"><div class="empty-icon">👤</div><p>Nenhum usuário</p></div>'}
                </div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">✂️ Serviços por Preço</div></div>
                <div class="card-body">
                    ${topServicos.length ? topServicos.map(s => `
                        <div class="servico-row">
                            <div>
                                <div class="servico-row-nome">${s.nome}</div>
                                <small style="color:var(--cinza-medio)">${s.duracao}min · ${s.pontos}pts</small>
                            </div>
                            <div style="text-align:right">
                                <div class="servico-row-preco">R$ ${parseFloat(s.preco).toFixed(2)}</div>
                                <span class="status-badge ${s.status==1?'status-ativo':'status-inativo'}">${s.status==1?'Ativo':'Inativo'}</span>
                            </div>
                        </div>
                    `).join('') : '<div class="empty-state"><div class="empty-icon">✂️</div><p>Nenhum serviço</p></div>'}
                </div>
            </div>
        </div>
    `;
}

// ===================== USUÁRIOS =====================
async function renderUsuarios() {
    const usuarios = await apiGet('/buscar');
    const ativos = usuarios.filter(u => !u.primeiro_acesso).length;
    return `
        <div class="filter-bar">
            <input type="text" id="buscaUsuario" placeholder="🔍 Buscar por nome ou email..." oninput="filtrarUsuarios()" style="min-width:240px">
            <select onchange="filtrarUsuariosPorStatus(this.value)" style="width:auto">
                <option value="">Todos os status</option>
                <option value="ativo">Ativos</option>
                <option value="pendente">1º Acesso</option>
            </select>
            <span style="color:var(--cinza-medio);font-size:0.8rem;margin-left:auto">${usuarios.length} usuários · ${ativos} ativos</span>
        </div>
        <div class="card">
            <div class="card-header"><div class="card-title">👤 Usuários do Sistema</div></div>
            <div class="card-body" style="padding:0">
                <table class="data-table" id="tabelaUsuarios">
                    <thead><tr><th>ID</th><th>Nome</th><th>Email</th><th>CEP</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody>
                        ${usuarios.length ? usuarios.map(u => `
                            <tr data-status="${u.primeiro_acesso ? 'pendente' : 'ativo'}">
                                <td style="color:var(--cinza-medio)">#${u.id_usuario}</td>
                                <td><strong>${u.nome_completo}</strong></td>
                                <td>${u.email}</td>
                                <td>${u.cep}</td>
                                <td>${u.primeiro_acesso
                                    ? '<span class="status-badge status-pendente">1º Acesso</span>'
                                    : '<span class="status-badge status-ativo">Ativo</span>'}</td>
                                <td>
                                    <button class="btn-editar" onclick="editarUsuario(${u.id_usuario})">Editar</button>
                                    <button class="btn-deletar" onclick="deletarUsuario(${u.id_usuario})">Excluir</button>
                                </td>
                            </tr>
                        `).join('') : `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">👤</div><p>Nenhum usuário cadastrado</p></div></td></tr>`}
                    </tbody>
                </table>
            </div>
        </div>
    `;
}

function filtrarUsuarios() {
    const busca = document.getElementById('buscaUsuario')?.value.toLowerCase() || '';
    document.querySelectorAll('#tabelaUsuarios tbody tr').forEach(row => {
        const nome = row.cells[1]?.textContent.toLowerCase() || '';
        const email = row.cells[2]?.textContent.toLowerCase() || '';
        row.style.display = (nome.includes(busca) || email.includes(busca)) ? '' : 'none';
    });
}
function filtrarUsuariosPorStatus(val) {
    document.querySelectorAll('#tabelaUsuarios tbody tr').forEach(row => {
        row.style.display = (!val || row.dataset.status === val) ? '' : 'none';
    });
}

function abrirModalUsuario(data = null) {
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('modalContent').innerHTML = `
        ${modalHeader(data ? 'Editar Usuário' : 'Novo Usuário')}
        <div class="form-group"><label>Nome Completo *</label><input type="text" id="uNome" value="${data?.nome_completo || ''}"></div>
        <div class="form-group"><label>Email *</label><input type="email" id="uEmail" value="${data?.email || ''}"></div>
        <div class="form-group"><label>CEP *</label><input type="text" id="uCep" value="${data?.cep || ''}" maxlength="10"></div>
        <div class="form-group"><label>Senha ${data ? '(deixe vazio para manter)' : '(opcional — se vazio, usuário define no 1º acesso)'}</label><input type="password" id="uSenha" placeholder="••••••"></div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
            <button class="btn-save" style="margin:0" onclick="salvarUsuario(${data?.id_usuario || 'null'})">Salvar</button>
        </div>
    `;
}

async function salvarUsuario(id) {
    const dados = {
        nome_completo: document.getElementById('uNome').value.trim(),
        email: document.getElementById('uEmail').value.trim(),
        cep: document.getElementById('uCep').value.trim(),
        senha: document.getElementById('uSenha').value
    };
    if (!dados.nome_completo || !dados.email || !dados.cep) { toast('Preencha todos os campos obrigatórios', 'error'); return; }
    const result = id
        ? await apiPut('/atualizar', { id_usuario: id, ...dados })
        : await apiPost('/cadastrar', dados);
    if (result.error) { toast(result.error, 'error'); return; }
    toast(result.mensagem || 'Operação realizada!');
    fecharModal(); renderPage();
}

async function editarUsuario(id) {
    const usuarios = await apiGet('/buscar');
    abrirModalUsuario(usuarios.find(u => u.id_usuario === id));
}

async function deletarUsuario(id) {
    if (!confirm('Excluir este usuário? Esta ação não pode ser desfeita.')) return;
    const result = await apiDelete('/deletar', { id_usuario: id });
    toast(result.mensagem || result.error || 'Operação realizada', result.error ? 'error' : 'success');
    renderPage();
}

// ===================== SERVIÇOS =====================
async function renderServicos() {
    const servicos = await apiGet('/servicos');
    return `
        <div class="filter-bar">
            <input type="text" id="buscaServico" placeholder="🔍 Buscar serviço..." oninput="filtrarServicos()" style="min-width:220px">
            <select onchange="filtrarServicosPorStatus(this.value)" style="width:auto">
                <option value="">Todos</option>
                <option value="1">Ativos</option>
                <option value="0">Inativos</option>
            </select>
            <span style="color:var(--cinza-medio);font-size:0.8rem;margin-left:auto">${servicos.length} serviços</span>
        </div>
        <div class="card">
            <div class="card-header"><div class="card-title">✂️ Serviços</div></div>
            <div class="card-body" style="padding:0">
                <table class="data-table" id="tabelaServicos">
                    <thead><tr><th>ID</th><th>Serviço</th><th>Preço</th><th>Duração</th><th>Pontos</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody>
                        ${servicos.length ? servicos.map(s => `
                            <tr data-status="${s.status}">
                                <td style="color:var(--cinza-medio)">#${s.id_servicos}</td>
                                <td><strong>${s.nome}</strong></td>
                                <td>R$ ${parseFloat(s.preco).toFixed(2)}</td>
                                <td>${s.duracao} min</td>
                                <td><span style="background:#f5f3ff;color:#7c3aed;padding:2px 8px;border-radius:12px;font-size:0.75rem;font-weight:600">${s.pontos} pts</span></td>
                                <td><span class="status-badge ${s.status==1?'status-ativo':'status-inativo'}">${s.status==1?'Ativo':'Inativo'}</span></td>
                                <td>
                                    <button class="btn-editar" onclick="editarServico(${s.id_servicos})">Editar</button>
                                    <button class="btn-deletar" onclick="deletarServico(${s.id_servicos})">Excluir</button>
                                </td>
                            </tr>
                        `).join('') : `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">✂️</div><p>Nenhum serviço cadastrado</p></div></td></tr>`}
                    </tbody>
                </table>
            </div>
        </div>
    `;
}

function filtrarServicos() {
    const busca = document.getElementById('buscaServico')?.value.toLowerCase() || '';
    document.querySelectorAll('#tabelaServicos tbody tr').forEach(row => {
        row.style.display = row.cells[1]?.textContent.toLowerCase().includes(busca) ? '' : 'none';
    });
}
function filtrarServicosPorStatus(val) {
    document.querySelectorAll('#tabelaServicos tbody tr').forEach(row => {
        row.style.display = (!val || row.dataset.status == val) ? '' : 'none';
    });
}

function abrirModalServico(data = null) {
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('modalContent').innerHTML = `
        ${modalHeader(data ? 'Editar Serviço' : 'Novo Serviço')}
        <div class="form-group"><label>Nome *</label><input type="text" id="sNome" value="${data?.nome || ''}"></div>
        <div class="form-row">
            <div class="form-group"><label>Preço (R$) *</label><input type="number" id="sPreco" step="0.01" min="0" value="${data?.preco || ''}"></div>
            <div class="form-group"><label>Duração (min) *</label><input type="number" id="sDuracao" min="1" value="${data?.duracao || ''}"></div>
        </div>
        <div class="form-group"><label>Pontos de Fidelidade</label><input type="number" id="sPontos" min="0" value="${data?.pontos ?? 0}"></div>
        ${data ? `<div class="form-group"><label>Status</label><select id="sStatus"><option value="1" ${data.status==1?'selected':''}>Ativo</option><option value="0" ${data.status==0?'selected':''}>Inativo</option></select></div>` : ''}
        <div class="modal-btns">
            <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
            <button class="btn-save" style="margin:0" onclick="salvarServico(${data?.id_servicos || 'null'})">Salvar</button>
        </div>
    `;
}

async function salvarServico(id) {
    const dados = {
        nome: document.getElementById('sNome').value.trim(),
        preco: parseFloat(document.getElementById('sPreco').value),
        duracao: parseInt(document.getElementById('sDuracao').value),
        pontos: parseInt(document.getElementById('sPontos').value) || 0
    };
    if (!dados.nome || isNaN(dados.preco) || isNaN(dados.duracao)) { toast('Preencha todos os campos obrigatórios', 'error'); return; }
    let result;
    if (id) {
        dados.status = parseInt(document.getElementById('sStatus')?.value ?? 1);
        result = await apiPut(`/servicos/${id}`, dados);
    } else {
        dados.status = 1; // Novo serviço sempre começa ativo
        result = await apiPost('/servicos', dados);
    }
    if (result.error) { toast(result.error, 'error'); return; }
    toast(result.mensagem || 'Serviço salvo!');
    fecharModal(); renderPage();
}

async function editarServico(id) { abrirModalServico(await apiGet(`/servicos/${id}`)); }
async function deletarServico(id) {
    if (!confirm('Desativar este serviço?')) return;
    const result = await apiDelete(`/servicos/${id}`);
    toast(result.mensagem || result.error, result.error ? 'error' : 'success');
    renderPage();
}

// ===================== FUNCIONÁRIOS (API) =====================
async function renderFuncionarios() {
    const funcs = await apiGet('/funcionarios');
    return `
        <div class="filter-bar">
            <input type="text" id="buscaFunc" placeholder="🔍 Buscar funcionário..." oninput="filtrarFuncionarios()" style="min-width:220px">
            <span style="color:var(--cinza-medio);font-size:0.8rem;margin-left:auto">${funcs.length} funcionários</span>
        </div>
        <div class="card">
            <div class="card-header"><div class="card-title">💈 Funcionários</div></div>
            <div class="card-body" style="padding:0">
                <table class="data-table" id="tabelaFunc">
                    <thead><tr><th>ID</th><th>Nome</th><th>Função</th><th>Ações</th></tr></thead>
                    <tbody>
                        ${funcs.length ? funcs.map(f => `
                            <tr>
                                <td style="color:var(--cinza-medio)">#${f.id_funcionario}</td>
                                <td><strong>${f.nome}</strong></td>
                                <td><span style="background:#eff6ff;color:#2563eb;padding:3px 10px;border-radius:12px;font-size:0.75rem;font-weight:600">${f.funcao}</span></td>
                                <td>
                                    <button class="btn-editar" onclick="editarFuncionario(${f.id_funcionario})">Editar</button>
                                    <button class="btn-deletar" onclick="deletarFuncionario(${f.id_funcionario})">Excluir</button>
                                </td>
                            </tr>
                        `).join('') : `<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">💈</div><p>Nenhum funcionário cadastrado</p></div></td></tr>`}
                    </tbody>
                </table>
            </div>
        </div>
    `;
}

function filtrarFuncionarios() {
    const busca = document.getElementById('buscaFunc')?.value.toLowerCase() || '';
    document.querySelectorAll('#tabelaFunc tbody tr').forEach(row => {
        const nome = row.cells[1]?.textContent.toLowerCase() || '';
        row.style.display = nome.includes(busca) ? '' : 'none';
    });
}

function abrirModalFuncionario(data = null) {
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('modalContent').innerHTML = `
        ${modalHeader(data ? 'Editar Funcionário' : 'Novo Funcionário')}
        <div class="form-group"><label>Nome *</label><input type="text" id="fNome" value="${data?.nome || ''}"></div>
        <div class="form-group"><label>Função *</label><input type="text" id="fFuncao" value="${data?.funcao || ''}" placeholder="Ex: Barbeiro, Estilista..."></div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
            <button class="btn-save" style="margin:0" onclick="salvarFuncionario(${data?.id_funcionario || 'null'})">Salvar</button>
        </div>

}

async function salvarFuncionario(id) {

        nome: document.getElementById('fNome').value.trim(),
        funcao: document.getElementById('fFuncao').value.trim()
    };
    if (!dados.nome || !dados.funcao) { toast('Preencha todos os campos', 'error'); return; }

        ? await apiPut(`/funcionarios/${id}`, dados)
        : await apiPost('/funcionarios', dados);
    if (result.error) { toast(result.error, 'error'); return; }
    toast(result.mensagem || 'Funcionário salvo!');
    fecharModal(); renderPage();
}

async function editarFuncionario(id) {
    const funcs = await apiGet('/funcionarios');
    abrirModalFuncionario(funcs.find(f => f.id_funcionario === id));
}

async function deletarFuncionario(id) {
    if (!confirm('Excluir este funcionário?')) return;
    const result = await apiDelete(`/funcionarios/${id}`);
    toast(result.mensagem || result.error, result.error ? 'error' : 'success');
    renderPage();
}

// ===================== AGENDAMENTOS (API) =====================
async function renderAgendamentos() {
    const agendamentos = await apiGet('/agendamentos');
    return `
        <div class="filter-bar">
            <input type="date" id="filtroData" onchange="filtrarAgendamentos()">
            <select id="filtroStatus" onchange="filtrarAgendamentos()" style="width:auto">
                <option value="">Todos os status</option>
                <option value="agendado">Agendado</option>
                <option value="confirmado">Confirmado</option>
                <option value="concluido">Concluído</option>
                <option value="cancelado">Cancelado</option>
            </select>
            <span style="color:var(--cinza-medio);font-size:0.8rem;margin-left:auto">${agendamentos.length} agendamentos</span>
        </div>
        <div class="card">
            <div class="card-header"><div class="card-title">📅 Agendamentos</div></div>
            <div class="card-body" style="padding:0">
                <table class="data-table" id="tabelaAg">
                    <thead><tr><th>ID</th><th>Data/Hora</th><th>Cliente</th><th>Serviço</th><th>Profissional</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody>
                        ${agendamentos.length ? agendamentos.map(a => {
                            const d = new Date(a.data);
                            const dataFmt = d.toLocaleDateString('pt-BR');
                            const horaFmt = d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
                            return `
                            <tr data-status="${a.status}">
                                <td style="color:var(--cinza-medio)">#${a.id}</td>
                                <td><strong>${dataFmt}</strong><br><small style="color:var(--cinza-medio)">${horaFmt}</small></td>
                                <td>${a.cliente_nome || a.id_usuario}</td>
                                <td>${a.servico_nome || a.id_servicos}</td>
                                <td>${a.funcionario_nome || a.id_funcionario}</td>
                                <td><span class="status-badge status-${a.status}">${a.status}</span></td>
                                <td>
                                    <button class="btn-editar" onclick="editarAgendamento(${a.id})">Editar</button>
                                    <button class="btn-deletar" onclick="deletarAgendamento(${a.id})">Excluir</button>
                                </td>
                            </tr>`;
                        }).join('') : `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📅</div><p>Nenhum agendamento encontrado</p></div></td></tr>`}
                    </tbody>
                </table>
            </div>
        </div>
    `;
}

function filtrarAgendamentos() {
    const data = document.getElementById('filtroData')?.value || '';
    const status = document.getElementById('filtroStatus')?.value || '';
    document.querySelectorAll('#tabelaAg tbody tr').forEach(row => {
        let show = true;
        if (status && row.dataset.status !== status) show = false;
        if (data) {
            const cellData = row.cells[1]?.querySelector('strong')?.textContent || '';
            const [day, month, year] = cellData.split('/');
            const rowDate = year && month && day ? `${year}-${month}-${day}` : '';
            if (rowDate !== data) show = false;
        }
        row.style.display = show ? '' : 'none';
    });
}

async function abrirModalAgendamento(data = null) {
    const [usuarios, servicos, funcs] = await Promise.all([apiGet('/buscar'), apiGet('/servicos'), apiGet('/funcionarios')]);

    let dataVal = '', horaVal = '';
    if (data?.data) {
        const d = new Date(data.data);
        dataVal = d.toISOString().split('T')[0];
        horaVal = d.toTimeString().slice(0,5);
    }

    // Armazena lista de usuários globalmente para o autocomplete
    window._agUsuarios = usuarios;

    const clienteNomeInicial = data ? (usuarios.find(u => u.id_usuario == data.id_usuario)?.nome_completo || '') : '';

    document.getElementById('modal').style.display = 'flex';
    document.getElementById('modalContent').innerHTML = `
        ${modalHeader(data ? 'Editar Agendamento' : 'Novo Agendamento')}
        <div class="form-group" style="position:relative">
            <label>Cliente *</label>
            <input type="text" id="agClienteSearch" placeholder="Digite para buscar cliente..."
                autocomplete="off"
                value="${clienteNomeInicial}"
                oninput="filtrarClientesDropdown()"
                onfocus="document.getElementById('agClienteDropdown').style.display='block'; filtrarClientesDropdown()"
                onblur="setTimeout(()=>{ document.getElementById('agClienteDropdown').style.display='none' }, 200)"
                style="cursor:text">
            <input type="hidden" id="agCliente" value="${data?.id_usuario || ''}">
            <div id="agClienteDropdown"
                style="display:none;position:absolute;top:calc(100% + 2px);left:0;right:0;background:white;
                border:1px solid #e2e8f0;border-radius:9px;max-height:180px;overflow-y:auto;
                z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.12)">
                ${usuarios.map(u => `
                <div class="ag-cliente-opt" data-id="${u.id_usuario}" data-nome="${u.nome_completo.replace(/"/g,'&quot;')}"
                    onmousedown="selecionarClienteAg(${u.id_usuario}, this.dataset.nome)"
                    style="padding:9px 13px;cursor:pointer;font-size:0.86rem;border-bottom:1px solid #f1f5f9;transition:background 0.1s"
                    onmouseover="this.style.background='#eff6ff'"
                    onmouseout="this.style.background=''">
                    ${u.nome_completo}
                </div>`).join('')}
            </div>
        </div>
        <div class="form-group"><label>Serviço *</label>
            <select id="agServico">
                <option value="">Selecione o serviço</option>
                ${servicos.map(s => `<option value="${s.id_servicos}" ${data?.id_servicos==s.id_servicos?'selected':''}>${s.nome} — R$ ${parseFloat(s.preco).toFixed(2)}</option>`).join('')}
            </select>
        </div>
        <div class="form-group"><label>Profissional *</label>
            <select id="agFuncionario">
                <option value="">Selecione o profissional</option>
                ${funcs.map(f => `<option value="${f.id_funcionario}" ${data?.id_funcionario==f.id_funcionario?'selected':''}>${f.nome} — ${f.funcao}</option>`).join('')}
            </select>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Data *</label><input type="date" id="agData" value="${dataVal}"></div>
            <div class="form-group"><label>Horário *</label><input type="time" id="agHora" value="${horaVal}"></div>
        </div>
        <div class="form-group"><label>Status</label>
            <select id="agStatus">
                ${['agendado','confirmado','concluido','cancelado'].map(s => `<option value="${s}" ${data?.status===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
            </select>
        </div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
            <button class="btn-save" style="margin:0" onclick="salvarAgendamento(${data?.id || 'null'})">Salvar</button>
        </div>
    `;
}

function filtrarClientesDropdown() {
    const termo = document.getElementById('agClienteSearch').value.toLowerCase();
    const dropdown = document.getElementById('agClienteDropdown');
    if (!dropdown) return;
    dropdown.style.display = 'block';
    const opts = dropdown.querySelectorAll('.ag-cliente-opt');
    opts.forEach(opt => {
        const nome = opt.dataset.nome.toLowerCase();
        opt.style.display = nome.includes(termo) ? '' : 'none';
    });
    // Se o campo foi limpo, limpa o hidden também
    if (!document.getElementById('agClienteSearch').value.trim()) {
        document.getElementById('agCliente').value = '';
    }
}

function selecionarClienteAg(id, nome) {
    document.getElementById('agCliente').value = id;
    document.getElementById('agClienteSearch').value = nome;
    document.getElementById('agClienteDropdown').style.display = 'none';
}

async function salvarAgendamento(id) {
    const dataInput = document.getElementById('agData').value;
    const horaInput = document.getElementById('agHora').value;
    const servicoSelect = document.getElementById('agServico');
    const servicoOpt = servicoSelect.options[servicoSelect.selectedIndex];
    // Extrai o preço do texto da option (ex: "Corte — R$ 35.00")
    const precoMatch = servicoOpt?.text.match(/R\$\s*([\d,.]+)/);
    const agenda_valor = precoMatch ? parseFloat(precoMatch[1].replace(',', '.')) : 0;

    const dados = {
        id_usuario: parseInt(document.getElementById('agCliente').value),
        id_servicos: parseInt(document.getElementById('agServico').value),
        id_funcionario: parseInt(document.getElementById('agFuncionario').value),
        agenda_valor,
        data: dataInput && horaInput ? `${dataInput}T${horaInput}:00` : null,
        status: document.getElementById('agStatus').value
    };
    if (!dados.id_usuario || !dados.id_servicos || !dados.id_funcionario || !dados.data) {
        toast('Preencha todos os campos obrigatórios', 'error'); return;
    }
    const result = id
        ? await apiPut(`/agendamentos/${id}`, dados)
        : await apiPost('/agendamentos', dados);
    if (result.error) { toast(result.error, 'error'); return; }
    toast(result.mensagem || 'Agendamento salvo!');
    fecharModal(); renderPage();
}

async function editarAgendamento(id) {
    const ags = await apiGet('/agendamentos');
    abrirModalAgendamento(ags.find(a => a.id === id));
}

async function deletarAgendamento(id) {
    if (!confirm('Excluir este agendamento?')) return;
    const result = await apiDelete(`/agendamentos/${id}`);
    toast(result.mensagem || result.error, result.error ? 'error' : 'success');
    renderPage();
}

    return `
        <div class="dash-grid">
            <div class="card">
                <div class="card-header"><div class="card-title">👤 Meu Perfil</div></div>
                <div class="card-body">
                    <div class="config-section">

                        <div class="info-row"><span>Email</span><span>${usuarioLogado.email || '—'}</span></div>

                    </div>
                    <button class="btn-novo" style="width:auto;margin-top:6px" onclick="abrirModalEditarPerfil()">✏️ Editar Perfil</button>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">🔒 Segurança</div></div>
                <div class="card-body">
                    <p style="font-size:0.85rem;color:var(--cinza-medio);margin-bottom:14px">Altere sua senha de acesso ao sistema.</p>
                    <div class="form-group"><label>Nova Senha</label><input type="password" id="novaSenha" placeholder="Mínimo 6 caracteres"></div>
                    <div class="form-group"><label>Confirmar Senha</label><input type="password" id="confirmarSenha" placeholder="Repita a senha"></div>

                </div>

        <div class="card">
            <div class="card-header"><div class="card-title">ℹ️ Sobre o Sistema</div></div>

                <div class="info-row"><span>Sistema</span><span>BarbershopSystem</span></div>
                <div class="info-row"><span>Versão</span><span>2.0.0</span></div>
                <div class="info-row"><span>Backend</span><span>Node.js + Express + MySQL</span></div>
                <div class="info-row"><span>API Base</span><span>${API_URL}</span></div>
            </div>
        </div>

function abrirModalEditarPerfil() {
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('modalContent').innerHTML = `
        ${modalHeader('Editar Perfil')}
        <div class="form-group"><label>Nome Completo *</label><input type="text" id="pNome" value="${usuarioLogado.nome || ''}"></div>
        <div class="form-group"><label>Email *</label><input type="email" id="pEmail" value="${usuarioLogado.email || ''}"></div>
        <div class="form-group"><label>CEP</label><input type="text" id="pCep" value="${usuarioLogado.cep || ''}"></div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
            <button class="btn-save" style="margin:0" onclick="salvarPerfil()">Salvar</button>
        </div>
    `;
}

async function salvarPerfil() {
    const dados = {
        id_usuario: usuarioLogado.id_usuario,
        nome_completo: document.getElementById('pNome').value.trim(),
        email: document.getElementById('pEmail').value.trim(),
        cep: document.getElementById('pCep').value.trim()
    };
    if (!dados.nome_completo || !dados.email) { toast('Preencha os campos obrigatórios', 'error'); return; }
    const result = await apiPut('/atualizar', dados);
    if (result.error) { toast(result.error, 'error'); return; }
    usuarioLogado.nome = dados.nome_completo;
    usuarioLogado.email = dados.email;
    usuarioLogado.cep = dados.cep;
    localStorage.setItem('usuario', JSON.stringify(usuarioLogado));
    document.getElementById('sidebarNome').textContent = dados.nome_completo;
    document.getElementById('sidebarAvatar').textContent = dados.nome_completo.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
    toast('Perfil atualizado!');
    fecharModal(); renderPage();
}

async function alterarSenha() {
    const nova = document.getElementById('novaSenha')?.value;
    const conf = document.getElementById('confirmarSenha')?.value;
    if (!nova || nova.length < 6) { toast('Senha deve ter mínimo 6 caracteres', 'error'); return; }
    if (nova !== conf) { toast('As senhas não conferem', 'error'); return; }
    const result = await apiPut('/atualizar', { id_usuario: usuarioLogado.id_usuario, nome_completo: usuarioLogado.nome, email: usuarioLogado.email, cep: usuarioLogado.cep || '', senha: nova });
    if (result.error) { toast(result.error, 'error'); return; }
    toast('Senha alterada com sucesso!');
    document.getElementById('novaSenha').value = '';
    document.getElementById('confirmarSenha').value = '';
}

// ===================== LOGOUT =====================
function fazerLogout() {
    if (!confirm('Deseja sair do sistema?')) return;
    localStorage.removeItem('token');
    localStorage.removeItem('usuario');
    window.location.href = 'index.html';
}

inicializar();
